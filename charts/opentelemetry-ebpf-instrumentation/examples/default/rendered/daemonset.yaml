---
# Source: opentelemetry-ebpf-instrumentation/templates/daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: example-opentelemetry-ebpf-instrumentation
  namespace: default
  labels:
    helm.sh/chart: opentelemetry-ebpf-instrumentation-0.11.0
    app.kubernetes.io/name: opentelemetry-ebpf-instrumentation
    app.kubernetes.io/instance: example
    app.kubernetes.io/version: "v0.10.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: obi
    app.kubernetes.io/component: workload
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-ebpf-instrumentation
      app.kubernetes.io/instance: example
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      annotations:
        checksum/config: 5de284a0f4491a570574ed506384174d68f8bb2309d6ec6c131ee1cfd9a17723

      labels:
        helm.sh/chart: opentelemetry-ebpf-instrumentation-0.11.0
        app.kubernetes.io/name: opentelemetry-ebpf-instrumentation
        app.kubernetes.io/instance: example
        app.kubernetes.io/version: "v0.10.0"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: obi
        app.kubernetes.io/component: workload
    spec:
      serviceAccountName: example-opentelemetry-ebpf-instrumentation
      hostPID: true
      initContainers:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: ebpf-instrument
          image: ghcr.io/open-telemetry/opentelemetry-ebpf-instrumentation/ebpf-instrument:v0.10.0
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          ports:
          - name: metrics
            containerPort: 9090
            protocol: TCP
          env:
            - name: OTEL_EBPF_CONFIG_PATH
              value: "/etc/ebpf-instrument/config/ebpf-instrument-config.yml"
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.hostIP
          volumeMounts:
            - mountPath: /etc/ebpf-instrument/config
              name: ebpf-instrument-config
            - mountPath: /sys/fs/cgroup
              name: cgroup
              readOnly: true
            - mountPath: /sys/kernel/tracing
              name: tracefs
      volumes:
        - name: ebpf-instrument-config
          configMap:
            name: example-opentelemetry-ebpf-instrumentation
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
        - name: tracefs
          hostPath:
            path: /sys/kernel/tracing
