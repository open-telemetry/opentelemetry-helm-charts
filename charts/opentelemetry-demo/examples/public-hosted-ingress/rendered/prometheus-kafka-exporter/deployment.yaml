---
# Source: opentelemetry-demo/charts/prometheus-kafka-exporter/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-kafka-exporter
  labels:
    app: prometheus-kafka-exporter
    chart: prometheus-kafka-exporter-3.0.1
    release: example
    heritage: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-kafka-exporter
      release: example
  template:
    metadata:
      labels:
        app: prometheus-kafka-exporter
        release: example
    spec:
      serviceAccountName: prometheus-kafka-exporter
      containers:
        - args:
            - '--verbosity=0'
            - '--kafka.server=kafka:9092'
            - '--kafka.version=2.0.0'
          env:
          name: prometheus-kafka-exporter
          image: "danielqsj/kafka-exporter:v1.9.0"
          imagePullPolicy: IfNotPresent
          ports:
            - name: exporter-port
              containerPort: 9308
              protocol: TCP
