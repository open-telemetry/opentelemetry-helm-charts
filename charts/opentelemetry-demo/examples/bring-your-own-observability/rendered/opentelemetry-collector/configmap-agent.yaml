---
# Source: opentelemetry-demo/charts/opentelemetry-collector/templates/configmap-agent.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-agent
  namespace: default
  labels:
    helm.sh/chart: opentelemetry-collector-0.165.0
    app.kubernetes.io/name: opentelemetry-collector
    app.kubernetes.io/instance: example
    app.kubernetes.io/version: "0.156.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: opentelemetry-collector
    app.kubernetes.io/component: agent-collector
data:
  relay: |
    connectors:
      span_metrics: {}
    exporters:
      debug: {}
      opensearch:
        http:
          endpoint: http://opensearch:9200
          tls:
            insecure: true
        logs_index: otel-logs
        logs_index_time_format: yyyy-MM-dd
      otlp/my-own-observability-endpoint:
        endpoint: my-observability-endpoint:4317
        tls:
          insecure: true
      otlp_grpc/firepit:
        endpoint: firepit:4317
        tls:
          insecure: true
      otlp_grpc/jaeger:
        endpoint: jaeger:4317
        sending_queue:
          batch: {}
        tls:
          insecure: true
      otlp_http/prometheus:
        endpoint: http://prometheus:9090/api/v1/otlp
        sending_queue:
          batch: {}
        tls:
          insecure: true
    extensions:
      health_check:
        endpoint: ${env:MY_POD_IP}:13133
      k8s_leader_elector/k8s_cluster:
        auth_type: serviceAccount
        lease_name: k8s.cluster.receiver.opentelemetry.io
        lease_namespace: default
      k8s_observer:
        auth_type: serviceAccount
        node: ${env:K8S_NODE_NAME}
      opamp:
        agent_description:
          include_resource_attributes: true
          non_identifying_attributes:
            demo.collector.role: gateway
            deployment.environment.name: demo
        capabilities:
          reports_available_components: true
          reports_effective_config: true
          reports_health: true
        instance_uid: 00000000-0000-7000-8000-000000000001
        server:
          ws:
            endpoint: ws://opamp-server:4320/v1/opamp
    processors:
      batch: {}
      filter/sanitize_profiles:
        error_mode: ignore
        profiles:
          profile:
          - IsMatch(resource.attributes["service.name"], "containerd-shim-.*")
      gen_ai_normalizer:
        sources:
        - name: openllmetry
      k8s_attributes:
        extract:
          metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.node.name
          - k8s.pod.start_time
          - k8s.deployment.name
          - k8s.replicaset.name
          - k8s.replicaset.uid
          - k8s.daemonset.name
          - k8s.daemonset.uid
          - k8s.job.name
          - k8s.job.uid
          - k8s.container.name
          - k8s.cronjob.name
          - k8s.statefulset.name
          - k8s.statefulset.uid
          - container.image.tag
          - container.image.name
          - k8s.cluster.uid
          - service.namespace
          - service.name
          - service.version
          - service.instance.id
          otel_annotations: true
        filter:
          node_from_env_var: K8S_NODE_NAME
        passthrough: false
        pod_association:
        - sources:
          - from: resource_attribute
            name: container.id
        - sources:
          - from: resource_attribute
            name: k8s.pod.ip
        - sources:
          - from: resource_attribute
            name: k8s.pod.uid
        - sources:
          - from: connection
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      resource:
        attributes:
        - action: insert
          from_attribute: k8s.pod.uid
          key: service.instance.id
      resourcedetection:
        detectors:
        - env
        - system
      transform/sanitize_logs:
        error_mode: ignore
        log_statements:
        - context: scope
          statements:
          - set(attributes["otelcol_signal"], attributes["otelcol.signal"]) where attributes["otelcol.signal"]
            != nil and not IsMap(attributes["otelcol.signal"])
          - delete_key(attributes, "otelcol.signal") where attributes["otelcol_signal"]
            != nil
      transform/sanitize_spans:
        error_mode: ignore
        trace_statements:
        - conditions:
          - span.kind == SPAN_KIND_SERVER and resource.attributes["service.name"] == "frontend"
            and span.attributes["http.route"] == nil
          context: span
          statements:
          - set(span.attributes["http.route"], "/api/cart") where IsMatch(span.attributes["http.target"],
            "\\/api\\/cart")
          - set(span.attributes["http.route"], "/api/checkout") where IsMatch(span.attributes["http.target"],
            "\\/api\\/checkout")
          - set(span.attributes["http.route"], "/api/products/{productId}") where IsMatch(span.attributes["http.target"],
            "\\/api\\/products\\/.*")
          - set(span.attributes["http.route"], "/api/recommendations") where IsMatch(span.attributes["http.target"],
            "\\/api\\/recommendations")
          - set(span.attributes["http.route"], "/api/data") where IsMatch(span.attributes["http.target"],
            "\\/api\\/data.*")
        - context: span
          statements:
          - set_semconv_span_name("1.37.0", "unsanitized_span_name")
    receivers:
      hostmetrics:
        collection_interval: 10s
        root_path: /hostfs
        scrapers:
          cpu: null
          disk: null
          filesystem:
            exclude_fs_types:
              fs_types:
              - autofs
              - binfmt_misc
              - bpf
              - cgroup2
              - configfs
              - debugfs
              - devpts
              - devtmpfs
              - fusectl
              - hugetlbfs
              - iso9660
              - mqueue
              - nsfs
              - overlay
              - proc
              - procfs
              - pstore
              - rpc_pipefs
              - securityfs
              - selinuxfs
              - squashfs
              - sysfs
              - tracefs
              match_type: strict
            exclude_mount_points:
              match_type: regexp
              mount_points:
              - ^/dev($|/)
              - ^/proc($|/)
              - ^/sys($|/)
              - ^/run/k3s/containerd($|/)
              - ^/var/lib/docker($|/)
              - ^/var/lib/kubelet($|/)
              - ^/snap($|/)
          load: null
          memory: null
          network: null
      jaeger:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:14250
          thrift_compact:
            endpoint: ${env:MY_POD_IP}:6831
          thrift_http:
            endpoint: ${env:MY_POD_IP}:14268
      k8s_cluster:
        collection_interval: 10s
        k8s_leader_elector: k8s_leader_elector/k8s_cluster
      kafkametrics:
        brokers:
        - kafka:9092
        collection_interval: 10s
        scrapers:
        - brokers
        - topics
        - consumers
      kubeletstats:
        auth_type: serviceAccount
        collection_interval: 20s
        endpoint: ${env:K8S_NODE_IP}:10250
      otlp:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:4317
          http:
            cors:
              allowed_origins:
              - http://*
              - https://*
            endpoint: ${env:MY_POD_IP}:4318
      prometheus:
        config:
          scrape_configs:
          - job_name: opentelemetry-collector
            scrape_interval: 10s
            static_configs:
            - targets:
              - ${env:MY_POD_IP}:8888
      prometheus/ad:
        config:
          scrape_configs:
          - job_name: ad
            scrape_interval: 10s
            static_configs:
            - targets:
              - ad:9465
      receiver_creator/metrics:
        discovery:
          enabled: true
        watch_observers:
        - k8s_observer
      zipkin:
        endpoint: ${env:MY_POD_IP}:9411
    service:
      extensions:
      - health_check
      - opamp
      - k8s_observer
      - k8s_leader_elector/k8s_cluster
      pipelines:
        logs:
          exporters:
          - otlp/my-own-observability-endpoint
          - debug
          processors:
          - k8s_attributes
          - memory_limiter
          - resourcedetection
          - resource
          - transform/sanitize_logs
          receivers:
          - otlp
        metrics:
          exporters:
          - otlp/my-own-observability-endpoint
          - debug
          processors:
          - k8s_attributes
          - memory_limiter
          - resourcedetection
          - resource
          receivers:
          - otlp
          - kafkametrics
          - span_metrics
          - prometheus/ad
          - receiver_creator/metrics
          - hostmetrics
          - kubeletstats
          - k8s_cluster
        profiles:
          exporters:
          - otlp_grpc/firepit
          - debug
          processors:
          - k8s_attributes
          - memory_limiter
          - resourcedetection
          - resource
          - filter/sanitize_profiles
          receivers:
          - otlp
        traces:
          exporters:
          - otlp/my-own-observability-endpoint
          - debug
          - spanmetrics
          processors:
          - k8s_attributes
          - memory_limiter
          - resourcedetection
          - resource
          - transform/sanitize_logs
          - gen_ai_normalizer
          receivers:
          - otlp
          - jaeger
          - zipkin
      telemetry:
        logs:
          processors:
          - batch:
              exporter:
                otlp:
                  endpoint: http://otel-collector:4318
                  insecure: true
                  protocol: http/protobuf
        metrics:
          level: detailed
          readers:
          - periodic:
              exporter:
                otlp:
                  endpoint: http://otel-collector:4318
                  insecure: true
                  protocol: http/protobuf
              interval: 10000
              timeout: 5000
        resource:
          host.name: ${env:OTEL_K8S_NODE_NAME}
          k8s.namespace.name: ${env:OTEL_K8S_NAMESPACE}
          k8s.node.ip: ${env:OTEL_K8S_NODE_IP}
          k8s.node.name: ${env:OTEL_K8S_NODE_NAME}
          k8s.pod.ip: ${env:OTEL_K8S_POD_IP}
          k8s.pod.name: ${env:OTEL_K8S_POD_NAME}
