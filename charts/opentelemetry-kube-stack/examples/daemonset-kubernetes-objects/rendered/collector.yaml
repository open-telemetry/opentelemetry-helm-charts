---
# Source: opentelemetry-kube-stack/templates/collector.yaml
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: example-daemon
  namespace: default
  labels:
    helm.sh/chart: opentelemetry-kube-stack-0.18.0
    app.kubernetes.io/version: "0.153.0"
    app.kubernetes.io/managed-by: Helm
    release: "example"        
spec:
  managementState: managed
  mode: daemonset
  config:
    exporters:
      debug: {}
    extensions:
      k8s_leader_elector/k8s_objects:
        auth_type: serviceAccount
        lease_name: k8s.objects.receiver.opentelemetry.io
        lease_namespace: default
    processors:
      batch:
        send_batch_max_size: 1500
        send_batch_size: 1000
        timeout: 1s
      resource/hostname:
        attributes:
        - action: insert
          from_attribute: k8s.node.name
          key: host.name
      resourcedetection/env:
        detectors:
        - env
        - k8snode
        override: false
        timeout: 2s
    receivers:
      k8sobjects:
        k8s_leader_elector: k8s_leader_elector/k8s_objects
        objects:
        - mode: pull
          name: namespaces
        - mode: pull
          name: pods
        - mode: pull
          name: nodes
        - mode: pull
          name: services
        - mode: pull
          name: serviceaccounts
        - group: apps
          mode: pull
          name: deployments
        - group: apps
          mode: pull
          name: replicasets
        - group: apps
          mode: pull
          name: daemonsets
        - group: apps
          mode: pull
          name: statefulsets
        - group: batch
          mode: pull
          name: jobs
        - group: batch
          mode: pull
          name: cronjobs
        - group: rbac.authorization.k8s.io
          mode: pull
          name: roles
        - group: rbac.authorization.k8s.io
          mode: pull
          name: rolebindings
        - group: rbac.authorization.k8s.io
          mode: pull
          name: clusterroles
        - group: rbac.authorization.k8s.io
          mode: pull
          name: clusterrolebindings
        - group: storage.k8s.io
          mode: pull
          name: storageclasses
        - mode: pull
          name: persistentvolumes
        - mode: pull
          name: persistentvolumeclaims
        - group: networking.k8s.io
          mode: pull
          name: ingresses
        - group: networking.k8s.io
          mode: pull
          name: networkpolicies
        - group: autoscaling
          mode: pull
          name: horizontalpodautoscalers
        - group: policy
          mode: pull
          name: poddisruptionbudgets
        - group: apiextensions.k8s.io
          mode: pull
          name: customresourcedefinitions
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    service:
      extensions:
      - k8s_leader_elector/k8s_objects
      pipelines:
        logs:
          exporters:
          - debug
          processors:
          - resourcedetection/env
          - resource/hostname
          - batch
          receivers:
          - k8sobjects
        metrics:
          exporters:
          - debug
          processors:
          - resourcedetection/env
          - resource/hostname
          - batch
          receivers:
          - otlp
        traces:
          exporters:
          - debug
          processors:
          - resourcedetection/env
          - resource/hostname
          - batch
          receivers:
          - otlp
  imagePullPolicy: IfNotPresent
  upgradeStrategy: automatic
  terminationGracePeriodSeconds: 30
  resources:
    limits:
      cpu: 200m
      memory: 500Mi
    requests:
      cpu: 100m
      memory: 250Mi
  securityContext:
    {}
  env:
  - name: K8S_NODE_NAME 
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  - name: OTEL_K8S_NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  - name: OTEL_K8S_NODE_IP
    valueFrom:
      fieldRef:
        fieldPath: status.hostIP
  - name: OTEL_K8S_NAMESPACE
    valueFrom:
      fieldRef:
        apiVersion: v1
        fieldPath: metadata.namespace
  - name: OTEL_K8S_POD_NAME
    valueFrom:
      fieldRef:
        apiVersion: v1
        fieldPath: metadata.name
  - name: OTEL_K8S_POD_IP
    valueFrom:
      fieldRef:
        apiVersion: v1
        fieldPath: status.podIP
  - name: OTEL_RESOURCE_ATTRIBUTES
    value: "k8s.pod.name=$(OTEL_K8S_POD_NAME),k8s.namespace.name=$(OTEL_K8S_NAMESPACE),k8s.node.name=$(OTEL_K8S_NODE_NAME),host.name=$(OTEL_K8S_NODE_NAME),k8s.node.ip=$(OTEL_K8S_NODE_IP),k8s.pod.ip=$(OTEL_K8S_POD_IP),k8s.cluster.name=unknown_k8s_cluster"
