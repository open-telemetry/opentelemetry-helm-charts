---
# Source: opentelemetry-target-allocator/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: default
  name: example-opentelemetry-target-allocator-ta
  labels:
    helm.sh/chart: opentelemetry-target-allocator-0.128.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: opentelemetry-target-allocator
    app.kubernetes.io/version: "0.126.0"
    app.kubernetes.io/name: opentelemetry-target-allocator
    app.kubernetes.io/instance: example
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-target-allocator
      app.kubernetes.io/instance: example
  template:
    metadata:
      annotations:
        checksum/config: 5b1a6a30d3cb2cc3517ba6d414710cc20571f7ae6a11fcb143e0fa53e6174a8e
      labels:
        helm.sh/chart: opentelemetry-target-allocator-0.128.0
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: opentelemetry-target-allocator
        app.kubernetes.io/version: "0.126.0"
        app.kubernetes.io/name: opentelemetry-target-allocator
        app.kubernetes.io/instance: example
    spec:
      serviceAccountName: example-opentelemetry-target-allocator-ta
      automountServiceAccountToken: false
      containers:
        - name: targetallocator
          image: ghcr.io/open-telemetry/opentelemetry-operator/target-allocator:0.126.0
          ports:
            - containerPort: 8080
              name: http-port
          volumeMounts:
            - name: config-volume
              mountPath: /conf/
            - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              name: serviceaccount-token
              readOnly: true
          env: # Workaround for https://github.com/open-telemetry/opentelemetry-operator/pull/3976
            - name: OTELCOL_NAMESPACE
              value: default
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config-volume
          configMap:
            name: example-opentelemetry-target-allocator-ta-configmap
            items:
              - key: targetallocator.yaml
                path: targetallocator.yaml
        - name: serviceaccount-token
          projected:
            defaultMode: 0444
            sources:
              - serviceAccountToken:
                  path: token
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        apiVersion: v1
                        fieldPath: metadata.namespace
