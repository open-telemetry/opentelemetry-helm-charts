mode: statefulset

image:
  repository: "ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-k8s"

command:
  name: "otelcol-k8s"

replicaCount: 2

apiVersion: apps.kruise.io/v1beta1

rollout:
  strategy: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    partition: 0
