mode: daemonset

image:
  repository: "ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-k8s"

command:
  name: "otelcol-k8s"

rewriteDeprecatedComponentNames: false

presets:
  kubernetesAttributes:
    enabled: true

config:
  processors:
    k8sattributes:
      passthrough: false

resources:
  limits:
    cpu: 100m
    memory: 200M
