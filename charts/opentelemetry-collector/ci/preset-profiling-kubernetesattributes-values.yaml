mode: daemonset

image:
  repository: "ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-ebpf-profiler"

command:
  name: "otelcol-ebpf-profiler"
  extraArgs: ["--feature-gates=+service.profilesSupport"]

presets:
  profiling:
    enabled: true
  kubernetesAttributes:
    enabled: true

resources:
  limits:
    cpu: 100m
    memory: 200M

alternateConfig:
  receivers:
    profiling: {}
  exporters:
    debug: {}
  extensions:
    health_check:
      endpoint: ${env:MY_POD_IP}:13133
  service:
    extensions:
      - health_check
    pipelines:
      profiles:
        receivers:
          - profiling
        exporters:
          - debug
