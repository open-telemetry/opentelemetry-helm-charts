mode: daemonset

image:
  repository: "ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-ebpf-profiler"

command:
  name: "otelcol-ebpf-profiler"
  extraArgs: ["--feature-gates=+service.profilesSupport"]

presets:
  profiling:
    enabled: true
  kubernetesAttributes:
    enabled: true

resources:
  limits:
    cpu: 100m
    memory: 200M

# The opentelemetry-collector-ebpf-profiler image only includes a limited set of
# components. Use alternateConfig to bypass the chart's default config (which
# references receivers like otlp/jaeger/prometheus/zipkin that the profiler image
# does not ship). The profiling and kubernetesAttributes presets inject the
# remaining components needed for the profiles pipeline.
alternateConfig:
  extensions:
    health_check:
      endpoint: ${env:MY_POD_IP}:13133
  service:
    extensions:
      - health_check
    pipelines:
      profiles:
        exporters:
          - debug
