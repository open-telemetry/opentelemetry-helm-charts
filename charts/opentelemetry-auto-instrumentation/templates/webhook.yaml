{{- $cert := fromYaml (include "helper.WebhookCert" .) }}
{{- $caCertEnc := $cert.ca }}
{{- $certCrtEnc := $cert.crt }}
{{- $certKeyEnc := $cert.key }}
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata:
  {{- if .Values.cert.secretAnnotations }}
  annotations:
  {{- toYaml .Values.cert.secretAnnotations | nindent 4 }}
  {{- end }}
  labels:
    {{- include "helper.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
    {{- if .Values.cert.secretLabels }}
    {{- toYaml .Values.admissionWebhooks.secretLabels | nindent 4 }}
    {{- end }}
  name: {{ default (printf "%s-controller-manager-service-cert" (include "helper.fullname" .)) .Values.cert.secretName }}
  namespace: {{ template "helper.namespace" . }}
data:
  tls.crt: {{ $certCrtEnc }}
  tls.key: {{ $certKeyEnc }}
  ca.crt: {{ $caCertEnc }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
  annotations:
    cert-manager.io/inject-ca-from: {{ template "helper.namespace" . }}/{{ .Values.cert.name }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  labels:
    {{- include "helper.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
  name: {{ template "helper.MutatingWebhookName" . }}-mutation
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      caBundle: {{ $caCertEnc }}
      service:
        name: {{ template "helper.fullname" . }}-webhook
        namespace: {{ template "helper.namespace" . }}
        path: /mutate-v1-pod
        port: {{ .Values.webhook.servicePort }}
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    name: mpod.kb.io
    {{- if .Values.webhook.namespaceSelector }}
    namespaceSelector:
    {{- toYaml .Values.webhook.namespaceSelector | nindent 6 }}
    {{- end }}
    {{- if .Values.webhook.objectSelector }}
    objectSelector:
    {{- toYaml .Values.webhook.objectSelector | nindent 6 }}
    {{- end }}
    rules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        operations:
          - CREATE
        resources:
          - pods
        scope: Namespaced
    sideEffects: None
    timeoutSeconds: {{ .Values.webhook.timeoutSeconds }}
