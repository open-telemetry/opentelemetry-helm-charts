apiVersion: v1
kind: Service
metadata:
  namespace: {{ template "helper.namespace" . }}
  name: {{ template "helper.fullname" . }}-webhook
spec:
  selector:
    {{- include "helper.selectorLabels" . | nindent 4 }}
  ports:
    - name: http-port
      protocol: TCP
      port: {{ .Values.webhook.servicePort }}
      targetPort: webhook-server
