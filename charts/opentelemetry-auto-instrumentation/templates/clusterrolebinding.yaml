{{- if .Values.manager.serviceAccount.create }}
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ template "helper.managerClusterRoleBindingName" . }}
  labels:
    {{- include "helper.commonLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ template "helper.managerClusterRoleName" . }}
subjects:
- kind: ServiceAccount
  name: {{ template "helper.managerServiceAccountName" . }}
  namespace: {{ template "helper.namespace" . }}
  {{- end }}
